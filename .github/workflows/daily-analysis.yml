name: Daily A-Share Analysis

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python main.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: stock-report
          path: output/
